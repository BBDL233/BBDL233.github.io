<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人人网注册页面</title>
</head>
<body>
<header><img src="人人网.png" alt="人人网"></header>
<section>
    <p>人人网,中国 <strong>最真实、最有效</strong>的社会平台,加入人人网,找回老朋友,结交新朋友</p><br />
    <p>电子邮箱: <input type="email" name="useremail"></p>
    <p>设置密码: <input type="password" name="setpass"></p>
    <p>真实姓名: <input type="text" name="realname"></p>
    <p>性别 <input type="radio" name="boy" checked/>男 <input type="radio" name="girl">女</p>
    <p>
        生日: 
        <select name="year">
            <option value="1991" selected="select">1991</option>
        </select>
        年
        <select name="moon">
            <option value="11" selected="select">11</option>
        </select>
        月
        <select name="day">
            <option value="30" selected="select">30</option>
        </select>
        日
    </p>
    <p><strong>为什么要填写我的生日？</strong></p>
    <p>
        我现在:
        <select name="sf">
            <option value="none" selected="select">请选择身份</option>
            <option value="doctor">医生</option>
            <option value="teacher">老师</option>
        </select>
        （非常重要）
    </p>
    <p><img src="验证码.png" alt="验证码"><a href="#">看不清换一张?</a></p>
    <p>验证码: <input type="text" name="yzm"></p>
    <a href="#"><img src="立即注册.png" alt="立即注册"></a>
</section>
</body>
</html>
