<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQ注册验证</title>
</head>
<body>
<header>
    <img src="image/bg_chs.png" alt="QQ注册">
</header>
<section>
    <h1>注册账号</h1>
    <p><label for="name">昵称 </label><input type="text" id="name" required pattern="[-\w\u4E00-\u9FA5]{4,10}" minlength="4" maxlength="10"> 长度为4-10个字符</p>
    <p><label for="setpass">密码 </label><input type="password" id="setpass" required pattern="[\dA-Za-z]{6,16}" minlength="6" maxlength="16"> 长度为6-16个字符</p>
    <p><label for="pass">确认密码 </label><input type="password" id="pass" required pattern="[\dA-Za-z]{6,16}" minlength="6" maxlength="16"> 长度为6-16个字符</p>
    <p><label for="phone">手机号码 </label><input type="text" id="phone" required pattern="1[3578]\d{9}"> 以13|5|7|8开头</p>
    <p><label for="email">有限 </label><input type="email" id="email"></p>
    <p><label for="bday">年龄 </label><input type="number" required pattern="\d|[1-9]\d|1[0-2]\d"></p>
    <input type="image" value="立即注册" src="image/btn.bmp">
</section>
</body>
</html>
