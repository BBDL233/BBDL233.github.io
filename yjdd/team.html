<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们团队</title>
    <style>
        #back {
        position: fixed; /* 使用绝对定位 */
        bottom: 20px; /* 距离底部20像素 */
        right: 20px; /* 距离右侧20像素 */
        display: block; /* 使链接以块级元素显示 */
        padding: 10px; /* 内边距 */
        background-color: #f0f0f0; /* 背景颜色 */
        color: #333; /* 文本颜色 */
        text-decoration: none; /* 去除下划线 */
        border-radius: 5px; /* 边框圆角 */
        border: none;
        }

        #back:hover {
        /* 鼠标悬停时的边框样式 */
        border: 2px solid black; /* 蓝色边框 */
        cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>我们的网站开发成员</h1>

        <dd>我叫陈嘉</dd>

        <dd>小李</dd>
    </dl>
    <form action="cpdd.html"><button id="back">返回</button></form>

</html>
